<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1015 250" font-family="'Arial Black','Helvetica Neue',Arial,sans-serif">
  <!-- Frites (or), au-dessus de la fin du mot -->
  <g transform="translate(792 12) rotate(8)">
    <rect x="0"  y="2"  width="11" height="48" rx="3.5" fill="#f4b62c"/>
    <rect x="15" y="-6" width="11" height="56" rx="3.5" fill="#f6c84c"/>
    <rect x="30" y="0"  width="11" height="50" rx="3.5" fill="#f4b62c"/>
    <rect x="45" y="8"  width="11" height="42" rx="3.5" fill="#f6c84c"/>
  </g>

  <!-- Monogramme : P or (derrière) -->
  <path transform="translate(14 46)" fill="#f4b62c" fill-rule="evenodd"
    d="M16,8 L60,8 C84,8 100,24 100,46 C100,68 84,84 60,84 L40,84 L40,132 L16,132 Z
       M40,30 L58,30 C68,30 74,36 74,46 C74,56 68,62 58,62 L40,62 Z"/>
  <!-- Monogramme : P rouge (devant) -->
  <path transform="translate(42 46)" fill="#d62027" fill-rule="evenodd"
    d="M16,8 L60,8 C84,8 100,24 100,46 C100,68 84,84 60,84 L40,84 L40,132 L16,132 Z
       M40,30 L58,30 C68,30 74,36 74,46 C74,56 68,62 58,62 L40,62 Z"/>

  <!-- Mot-symbole -->
  <text x="170" y="166" font-size="118" font-weight="900" letter-spacing="4" fill="#d62027">APATCHINO</text>

  <!-- Vague dorée -->
  <path d="M250,212 C420,188 640,188 860,210" stroke="#f4b62c" stroke-width="9"
    stroke-linecap="round" fill="none"/>
</svg>
